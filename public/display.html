<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EraGuesser - Écran Principal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="display-mode">
    <div id="game-container">
        <header>
            <h1>EraGuesser</h1>
            <div id="stats">
                <span id="timer">00</span>s |
                Manche <span id="current-round">0</span> / <span id="total-rounds">3</span>
            </div>
        </header>

        <div id="content-area">
            <div id="photo-container">
                <img id="current-photo" src="" alt="Photo Historique">
                <div id="loading-message">
                    <h2>En attente de démarrage...</h2>
                    <p>Appuyez sur "ENTRÉE" ou cliquez ci-dessous pour lancer la partie.</p>
                    <button id="start-btn"
                        style="padding: 1rem 2rem; font-size: 1.5rem; background: var(--color-electric-aqua); color: var(--color-charcoal); border: none; border-radius: 8px; cursor: pointer; margin-top: 1rem;">Lancer
                        la partie</button>
                </div>
            </div>
            <!-- Defines where the result map will be shown (overlaid or replacing photo) -->
            <div id="screen-result" style="display:none; width:100%; height:100%;">
                <div id="result-map" style="width:100%; height:100%;"></div>
            </div>
        </div>

        <div id="sidebar">
            <h2>Classement</h2>
            <ul id="leaderboard-list">
                <!-- Players will be listed here -->
            </ul>
            <div id="qr-code-placeholder">
                <p>Scannez pour rejoindre</p>
                <!-- QR Code here -->
            </div>
        </div>
    </div>
    <script src="js/display.js"></script>
</body>

</html>
