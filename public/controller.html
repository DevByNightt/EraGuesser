<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manette EraGuesser</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="controller-mode">

    <div id="login-screen">
        <h1>EraGuesser</h1>
        <p>Entrez votre nom pour jouer</p>
        <input type="text" id="username" placeholder="Pseudo"
            style="padding: 1rem; font-size: 1.2rem; margin-bottom: 1rem; width: 80%;">
        <button id="join-btn">Rejoindre</button>
    </div>

    <div id="waiting-room" class="hidden" style="text-align: center; color: white; padding: 2rem;">
        <h2>Bienvenue !</h2>
        <p>Regardez le grand écran.</p>
        <p>La partie va bientôt commencer...</p>
        <div style="font-size: 4rem; margin-top: 2rem;">⏳</div>
    </div>

    <div id="game-interface" class="hidden">
        <div id="status-bar">En attente...</div>

        <!-- Map for Location Guess -->
        <h3>Où est-ce ?</h3>
        <div id="map-input"></div>

        <!-- Slider for Year Guess -->
        <h3>Quelle année ? <span id="selected-year">1950</span></h3>
        <input type="range" id="year-slider" min="1900" max="2024" value="1950" step="1">

        <button id="submit-guess">Valider</button>
    </div>

    <script src="js/controller.js"></script>
</body>

</html>
