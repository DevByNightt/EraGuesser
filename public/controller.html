<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manette EraGuesser</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="controller-mode">

    <div id="login-screen">
        <h1>EraGuesser</h1>
        <p>Votre nom pour le dossier</p>
        <input type="text" id="username" placeholder="Inspecteur..." autocomplete="off">
        <button id="join-btn">Rejoindre</button>
    </div>

    <div id="waiting-room" class="hidden">
        <h2>Dossier Accepté...</h2>
        <p>Regardez le tableau principal.</p>
        <p>En attente du début de l'enquête...</p>
        <div style="font-size: 3rem; margin-top: 1.5rem;">🔍</div>
    </div>

    <div id="game-interface" class="hidden">
        <div id="status-bar">En attente des indices...</div>

        <!-- Map for Location Guess -->
        <h3>Où s'est déroulé cet événement ?</h3>
        <div id="map-input"></div>

        <!-- Slider for Year Guess -->
        <h3>Année estimée : <span id="selected-year" style="color: var(--color-blood-red); font-weight: bold; font-size: 1.2rem;">1950</span></h3>
        <input type="range" id="year-slider" min="1900" max="2024" value="1950" step="1">

        <button id="submit-guess">Fermer le dossier</button>
    </div>

    <script src="js/controller.js"></script>
</body>

</html>
